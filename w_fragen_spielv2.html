<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W-Fragen üben 🎮</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #263348;
  --border: #334155;
  --accent: #38bdf8;
  --accent2: #f472b6;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --text: #e2e8f0;
  --muted: #64748b;
  --radius: 18px;
  --shadow: 0 8px 32px rgba(0,0,0,0.45);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 10% 0%, rgba(56,189,248,0.12) 0%, transparent 45%),
    radial-gradient(ellipse at 90% 100%, rgba(244,114,182,0.12) 0%, transparent 45%);
  min-height: 100vh;
  color: var(--text);
  padding: 24px 16px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Header ── */
header { text-align: center; margin-bottom: 28px; }
header h1 {
  font-family: 'Baloo 2', cursive;
  font-size: clamp(2rem, 6vw, 3rem);
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
header p { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }

/* ── Tabs ── */
.tabs {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 28px;
  background: var(--surface); border-radius: 99px; padding: 5px;
  border: 2px solid var(--border);
  justify-content: center;
}
.tab-btn {
  padding: 10px 18px; border: none; border-radius: 99px; cursor: pointer;
  font-family: 'Baloo 2', cursive; font-size: 0.95rem; font-weight: 700;
  background: transparent; color: var(--muted);
  transition: all 0.2s ease;
  white-space: nowrap;
}
.tab-btn.active {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #0f172a;
}

/* ── W-Word chips (shared) ── */
.w-chips {
  display: flex; flex-wrap: wrap; gap: 10px;
  justify-content: center; margin-bottom: 20px;
}
.w-chip {
  font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 800;
  padding: 8px 18px; border-radius: 12px; cursor: grab;
  border: 2px solid transparent;
  transition: transform 0.15s ease, opacity 0.2s ease;
  user-select: none;
}
.w-chip:active { cursor: grabbing; transform: scale(1.08); }
.w-chip.used   { opacity: 0.28; cursor: not-allowed; pointer-events: none; }

/* colour per W-word */
.wc-wer     { background: rgba(56,189,248,0.18); border-color: #38bdf8; color: #38bdf8; }
.wc-was     { background: rgba(244,114,182,0.18); border-color: #f472b6; color: #f472b6; }
.wc-wann    { background: rgba(251,191,36,0.18);  border-color: #fbbf24; color: #fbbf24; }
.wc-warum   { background: rgba(52,211,153,0.18);  border-color: #34d399; color: #34d399; }
.wc-welche  { background: rgba(167,139,250,0.18); border-color: #a78bfa; color: #a78bfa; }
.wc-wo      { background: rgba(251,146,60,0.18);  border-color: #fb923c; color: #fb923c; }
.wc-wie     { background: rgba(248,113,113,0.18); border-color: #f87171; color: #f87171; }
.wc-wielange{ background: rgba(34,211,238,0.18);  border-color: #22d3ee; color: #22d3ee; }
.wc-wieviel { background: rgba(163,230,53,0.18);  border-color: #a3e635; color: #a3e635; }

/* ── Progress ── */
.progress-wrap { width: 100%; max-width: 620px; margin-bottom: 14px; }
.progress-label { display:flex; justify-content:space-between; font-size:0.8rem; color:var(--muted); margin-bottom:6px; font-weight:700; }
.progress-bar-bg { background:var(--border); border-radius:99px; height:9px; overflow:hidden; }
.progress-fill   { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width 0.45s ease; }
.score-row { display:flex; gap:14px; justify-content:center; margin-bottom:18px; }
.score-pill { background:var(--surface); border:2px solid var(--border); border-radius:99px; padding:5px 16px; font-weight:900; font-size:0.88rem; display:flex; align-items:center; gap:7px; }
.dot { width:9px; height:9px; border-radius:50%; }
.dot-g { background:var(--green); }
.dot-r { background:var(--red); }

/* ── Game panels ── */
.game-panel { display:none; flex-direction:column; align-items:center; width:100%; max-width:620px; }
.game-panel.active { display:flex; }

/* ── GAME 1 card ── */
.g1-card {
  background: var(--surface); border:2px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 32px 26px 26px; width:100%;
  display:flex; flex-direction:column; gap:16px;
  position:relative; overflow:hidden;
  animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
.g1-card::before {
  content:''; position:absolute; top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}
.g1-qnum { font-size:0.75rem; color:var(--muted); font-weight:700; letter-spacing:.07em; }

.answer-bubble {
  background: var(--surface2); border-radius:12px; padding:12px 16px;
  font-size:1rem; font-weight:700; color:var(--text); line-height:1.45;
}
.answer-bubble span { color:var(--accent); }

.question-line {
  display:flex; align-items:center; flex-wrap:wrap; gap:8px;
  font-size:1.15rem; font-weight:700; line-height:1.6;
}

/* drop zone */
.drop-zone {
  min-width:120px; height:38px; border:2px dashed var(--border);
  border-radius:10px; display:inline-flex; align-items:center; justify-content:center;
  font-family:'Baloo 2',cursive; font-size:1rem; font-weight:800;
  color:var(--muted); padding:0 12px; cursor:pointer;
  transition:border-color 0.2s, background 0.2s;
  position:relative;
}
.drop-zone.drag-over { border-color:var(--accent); background:rgba(56,189,248,0.1); }
.drop-zone.filled    { border-style:solid; color:var(--text); }
.drop-zone .remove-btn {
  position:absolute; right:4px; top:50%; transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.8rem;
  line-height:1; padding:2px 3px;
}

.g1-hint { font-size:0.84rem; color:var(--muted); font-style:italic; }

.check-btn {
  align-self:flex-end; background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#0f172a; border:none; border-radius:12px; padding:12px 28px;
  font-family:'Baloo 2',cursive; font-size:1.05rem; font-weight:800; cursor:pointer;
  transition:transform 0.15s, filter 0.15s;
}
.check-btn:hover { transform:translateY(-2px); filter:brightness(1.07); }
.check-btn:disabled { opacity:0.35; cursor:not-allowed; transform:none; }

/* inline feedback */
.inline-fb {
  display:none; align-items:center; gap:10px;
  padding:12px 16px; border-radius:12px; font-weight:700; font-size:0.95rem;
}
.inline-fb.show { display:flex; }
.inline-fb.ok  { background:rgba(52,211,153,0.15); border:2px solid var(--green); color:var(--green); }
.inline-fb.bad { background:rgba(248,113,113,0.15); border:2px solid var(--red);   color:var(--red);   }

.next-btn {
  align-self:flex-end; background:var(--surface2); border:2px solid var(--border);
  color:var(--text); border-radius:12px; padding:11px 24px;
  font-family:'Baloo 2',cursive; font-size:1rem; font-weight:800; cursor:pointer;
  transition:transform 0.15s, border-color 0.15s;
  display:none;
}
.next-btn:hover { transform:translateY(-2px); border-color:var(--accent); }
.next-btn.show  { display:block; }

/* ── GAME 2 card ── */
.g2-card {
  background: var(--surface); border:2px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 32px 26px 26px; width:100%;
  display:flex; flex-direction:column; gap:18px;
  position:relative; overflow:hidden;
  animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
.g2-card::before {
  content:''; position:absolute; top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--accent2),var(--yellow));
}
.g2-qnum { font-size:0.75rem; color:var(--muted); font-weight:700; letter-spacing:.07em; }

.dialog-box {
  background:var(--surface2); border-radius:14px;
  padding:18px; display:flex; flex-direction:column; gap:12px;
}
.dialog-line { display:flex; gap:12px; align-items:flex-start; }
.speaker-badge {
  font-size:0.7rem; font-weight:900; letter-spacing:.06em; text-transform:uppercase;
  padding:3px 10px; border-radius:99px; flex-shrink:0; margin-top:2px;
  white-space:nowrap;
}
.speaker-a { background:rgba(56,189,248,0.2); color:var(--accent); border:1px solid rgba(56,189,248,0.4); }
.speaker-b { background:rgba(244,114,182,0.2); color:var(--accent2); border:1px solid rgba(244,114,182,0.4); }
.dialog-text { font-size:1rem; font-weight:700; line-height:1.55; }

/* gap in dialog */
.d-gap {
  display:inline-flex; align-items:center; justify-content:center;
  min-width:90px; height:30px; border:2px dashed var(--border);
  border-radius:8px; color:var(--muted); font-size:0.92rem; font-weight:700;
  padding:0 10px; vertical-align:middle; cursor:default;
}
.d-gap.answered { border-style:solid; }

.g2-options {
  display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
}
.g2-opt {
  font-family:'Baloo 2',cursive; font-size:1rem; font-weight:800;
  padding:9px 20px; border-radius:12px; cursor:pointer; border:2px solid transparent;
  transition:transform 0.15s, filter 0.15s;
}
.g2-opt:hover:not(:disabled) { transform:translateY(-2px); filter:brightness(1.08); }
.g2-opt:disabled { opacity:0.38; cursor:not-allowed; transform:none; }
.g2-opt.chosen-ok  { background:rgba(52,211,153,0.2)!important; border-color:var(--green)!important; color:var(--green)!important; }
.g2-opt.chosen-bad { background:rgba(248,113,113,0.2)!important; border-color:var(--red)!important;   color:var(--red)!important; }
.g2-opt.reveal-ok  { background:rgba(52,211,153,0.12); border-color:var(--green); color:var(--green); }

/* ── GAME 3 card ── */
.g3-card {
  background: var(--surface); border:2px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 32px 26px 26px; width:100%;
  display:flex; flex-direction:column; gap:16px;
  position:relative; overflow:hidden;
  animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
.g3-card::before {
  content:''; position:absolute; top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--yellow),var(--green));
}
.g3-qnum { font-size:0.75rem; color:var(--muted); font-weight:700; letter-spacing:.07em; }

.g3-answer-box {
  background:var(--surface2); border-radius:14px; padding:18px 20px;
  font-size:1.15rem; font-weight:700; line-height:1.45;
  border-left:4px solid var(--green);
}
.g3-answer-box .ab-label {
  display:block; font-size:0.7rem; color:var(--muted); font-weight:800;
  letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px;
}
.g3-answer-box .ab-text { color:var(--text); }

.g3-textarea {
  width:100%; min-height:60px; resize:vertical;
  background:var(--surface2); border:2px solid var(--border); border-radius:12px;
  padding:14px 16px; font-family:'Nunito',sans-serif; font-size:1.05rem; font-weight:700;
  color:var(--text); line-height:1.45;
  transition:border-color 0.2s, background 0.2s;
}
.g3-textarea::placeholder { color:var(--muted); font-weight:600; font-style:italic; }
.g3-textarea:focus { outline:none; border-color:var(--accent); background:rgba(56,189,248,0.06); }
.g3-textarea:disabled { opacity:0.7; cursor:not-allowed; }

.g3-solution-box {
  display:none; flex-direction:column; gap:6px;
  background:rgba(251,191,36,0.10); border:2px solid var(--yellow); border-radius:12px;
  padding:14px 18px; animation:fadeDown 0.35s ease both;
}
.g3-solution-box.show { display:flex; }
.g3-solution-box .sol-label {
  font-size:0.72rem; color:var(--yellow); font-weight:800;
  letter-spacing:.08em; text-transform:uppercase;
}
.g3-solution-box .sol-text { font-size:1.1rem; font-weight:800; color:var(--text); line-height:1.4; }
.g3-solution-box .sol-text .sol-w { padding:2px 8px; border-radius:7px; }

.self-eval-row {
  display:none; gap:10px; flex-wrap:wrap;
  animation:fadeDown 0.35s ease both;
}
.self-eval-row.show { display:flex; }
.self-eval-btn {
  flex:1; min-width:140px;
  font-family:'Baloo 2',cursive; font-size:1rem; font-weight:800;
  padding:12px 18px; border-radius:12px; cursor:pointer;
  border:2px solid; transition:transform 0.15s, filter 0.15s;
}
.self-eval-btn.ok  { background:rgba(52,211,153,0.14); border-color:var(--green); color:var(--green); }
.self-eval-btn.bad { background:rgba(248,113,113,0.14); border-color:var(--red);   color:var(--red); }
.self-eval-btn:hover:not(:disabled) { transform:translateY(-2px); filter:brightness(1.12); }
.self-eval-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none; }
.self-eval-btn.chosen.ok  { background:rgba(52,211,153,0.3); }
.self-eval-btn.chosen.bad { background:rgba(248,113,113,0.3); }

.show-sol-btn {
  align-self:flex-end;
  background:linear-gradient(135deg,var(--yellow),var(--green));
  color:#0f172a; border:none; border-radius:12px; padding:12px 26px;
  font-family:'Baloo 2',cursive; font-size:1.02rem; font-weight:800; cursor:pointer;
  transition:transform 0.15s, filter 0.15s;
}
.show-sol-btn:hover:not(:disabled) { transform:translateY(-2px); filter:brightness(1.07); }
.show-sol-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

/* ── End screen ── */
.end-screen {
  display:none; flex-direction:column; align-items:center; gap:18px;
  max-width:620px; width:100%; animation: cardIn 0.5s ease both;
}
.end-screen.show { display:flex; }
.end-trophy { font-size:5.5rem; animation: floaty 2s ease-in-out infinite; }
.end-title {
  font-family:'Baloo 2',cursive; font-size:2rem; font-weight:800; text-align:center;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.end-score { font-size:2.4rem; font-weight:900; color:var(--yellow); font-family:'Baloo 2',cursive; }
.end-msg { color:var(--muted); text-align:center; font-size:1rem; max-width:340px; }

.results-list { width:100%; display:flex; flex-direction:column; gap:9px; max-height:320px; overflow-y:auto; }
.results-list::-webkit-scrollbar { width:5px; }
.results-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
.r-row { background:var(--surface); border:2px solid var(--border); border-radius:13px; padding:10px 14px; display:flex; align-items:center; gap:12px; font-size:0.86rem; }
.r-row.ok  { border-color:var(--green); }
.r-row.bad { border-color:var(--red); }
.r-text { flex:1; line-height:1.35; }
.r-sub  { color:var(--muted); font-size:0.78rem; margin-top:2px; }

.btn-restart {
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#0f172a; border:none; border-radius:14px; padding:15px 42px;
  font-family:'Baloo 2',cursive; font-size:1.1rem; font-weight:800; cursor:pointer;
  box-shadow:0 6px 24px rgba(56,189,248,0.3); transition:transform 0.15s, filter 0.15s;
}
.btn-restart:hover { transform:translateY(-2px); filter:brightness(1.07); }

/* End-screen button row */
.end-btn-row { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }

/* Secondary "load more" button (end screen) */
.btn-loadmore {
  background:var(--surface); color:var(--text); border:2px solid var(--accent);
  border-radius:14px; padding:14px 30px;
  font-family:'Baloo 2',cursive; font-size:1.05rem; font-weight:800; cursor:pointer;
  transition:transform 0.15s, background 0.15s;
}
.btn-loadmore:hover:not(:disabled) { transform:translateY(-2px); background:rgba(56,189,248,0.12); }
.btn-loadmore:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

/* In-game "load more" pill (top, near scores) */
.loadmore-row { display:flex; justify-content:center; margin-bottom:14px; }
.btn-loadmore-pill {
  background:var(--surface); color:var(--text);
  border:2px solid var(--border); border-radius:99px;
  padding:7px 18px; font-family:'Baloo 2',cursive; font-size:0.85rem; font-weight:800;
  cursor:pointer; display:inline-flex; align-items:center; gap:7px;
  transition:transform 0.15s, border-color 0.15s, background 0.15s;
}
.btn-loadmore-pill:hover:not(:disabled) { transform:translateY(-1px); border-color:var(--accent); background:rgba(56,189,248,0.08); }
.btn-loadmore-pill:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
.btn-loadmore-pill .lm-count { color:var(--muted); font-weight:700; font-size:0.78rem; }

@keyframes cardIn   { from{opacity:0;transform:scale(0.9) translateY(18px)} to{opacity:1;transform:scale(1) translateY(0)} }
@keyframes floaty   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<header>
  <h1>W-Fragen üben 🎮</h1>
  <p>Drei Spiele – eine Grammatik!</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab(1)">🎯 Spiel 1 – Drag & Drop</button>
  <button class="tab-btn"       onclick="switchTab(2)">💬 Spiel 2 – Dialog</button>
  <button class="tab-btn"       onclick="switchTab(3)">✏️ Spiel 3 – Schreiben</button>
</div>

<!-- ═══════════════════════════════════════════
     SPIEL 1
═══════════════════════════════════════════ -->
<div class="game-panel active" id="panel1">

  <div class="w-chips" id="g1Chips"></div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span id="g1ProgText">Frage 1 von 15</span>
      <span id="g1ProgPct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-fill" id="g1Fill" style="width:0%"></div></div>
  </div>
  <div class="score-row">
    <div class="score-pill"><div class="dot dot-g"></div><span id="g1Correct">0</span> richtig</div>
    <div class="score-pill"><div class="dot dot-r"></div><span id="g1Wrong">0</span> falsch</div>
  </div>
  <div class="loadmore-row">
    <button class="btn-loadmore-pill" id="g1LoadMorePill" onclick="loadMoreG1()">
      ⏭️ Nächste 15 laden <span class="lm-count" id="g1LoadCount"></span>
    </button>
  </div>

  <div id="g1CardWrap" style="width:100%"></div>
  <div class="end-screen" id="g1End">
    <div class="end-trophy" id="g1Trophy">🏆</div>
    <div class="end-title">Block geschafft!</div>
    <div class="end-score" id="g1Score"></div>
    <div class="end-msg"   id="g1Msg"></div>
    <div class="results-list" id="g1Results"></div>
    <div class="end-btn-row">
      <button class="btn-restart" onclick="restartG1()">🔄 Block wiederholen</button>
      <button class="btn-loadmore" id="g1EndLoadBtn" onclick="loadMoreG1()">⏭️ Weitere 15 laden</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     SPIEL 2
═══════════════════════════════════════════ -->
<div class="game-panel" id="panel2">

  <div class="progress-wrap">
    <div class="progress-label">
      <span id="g2ProgText">Frage 1 von 15</span>
      <span id="g2ProgPct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-fill" id="g2Fill" style="width:0%"></div></div>
  </div>
  <div class="score-row">
    <div class="score-pill"><div class="dot dot-g"></div><span id="g2Correct">0</span> richtig</div>
    <div class="score-pill"><div class="dot dot-r"></div><span id="g2Wrong">0</span> falsch</div>
  </div>
  <div class="loadmore-row">
    <button class="btn-loadmore-pill" id="g2LoadMorePill" onclick="loadMoreG2()">
      ⏭️ Nächste 15 laden <span class="lm-count" id="g2LoadCount"></span>
    </button>
  </div>

  <div id="g2CardWrap" style="width:100%"></div>
  <div class="end-screen" id="g2End">
    <div class="end-trophy" id="g2Trophy">🏆</div>
    <div class="end-title">Block geschafft!</div>
    <div class="end-score" id="g2Score"></div>
    <div class="end-msg"   id="g2Msg"></div>
    <div class="results-list" id="g2Results"></div>

// ── State ─────────────────────────────────────
const BLOCK_SIZE = 15;
let g1 = { cur:0, blockStart:0, correct:0, wrong:0, results:[], dropValue:null };
let g2 = { cur:0, blockStart:0, correct:0, wrong:0, results:[] };
let g3 = { cur:0, blockStart:0, correct:0, wrong:0, results:[], typed:'', revealed:false };
let dragging = null;

// helpers: how many questions are left after the current block
function g1RemainingAfterBlock() { return Math.max(0, g1Data.length - (g1.blockStart + currentG1BlockSize())); }
function g2RemainingAfterBlock() { return Math.max(0, g2Data.length - (g2.blockStart + currentG2BlockSize())); }
function g3RemainingAfterBlock() { return Math.max(0, g3Data.length - (g3.blockStart + currentG3BlockSize())); }
function currentG1BlockSize() { return Math.min(BLOCK_SIZE, g1Data.length - g1.blockStart); }
function currentG2BlockSize() { return Math.min(BLOCK_SIZE, g2Data.length - g2.blockStart); }
function currentG3BlockSize() { return Math.min(BLOCK_SIZE, g3Data.length - g3.blockStart); }

// update the in-game pill button state
function updateLoadMoreButtons() {
  const g1Btn = document.getElementById('g1LoadMorePill');
  const g1Cnt = document.getElementById('g1LoadCount');
  const g1Rem = g1RemainingAfterBlock();
  if (g1Btn) {
    g1Btn.disabled = g1Rem === 0;
    g1Cnt.textContent = g1Rem > 0 ? `(${g1Rem} übrig)` : '(alle gesehen)';
  }
  const g2Btn = document.getElementById('g2LoadMorePill');
  const g2Cnt = document.getElementById('g2LoadCount');
  const g2Rem = g2RemainingAfterBlock();
  if (g2Btn) {
    g2Btn.disabled = g2Rem === 0;
    g2Cnt.textContent = g2Rem > 0 ? `(${g2Rem} übrig)` : '(alle gesehen)';
  }
  const g3Btn = document.getElementById('g3LoadMorePill');
  const g3Cnt = document.getElementById('g3LoadCount');
  const g3Rem = g3RemainingAfterBlock();
  if (g3Btn) {
    g3Btn.disabled = g3Rem === 0;
    g3Cnt.textContent = g3Rem > 0 ? `(${g3Rem} übrig)` : '(alle gesehen)';
  }
}

function switchTab(n) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===n-1));
  document.getElementById('panel1').classList.toggle('active', n===1);
  document.getElementById('panel2').classList.toggle('active', n===2);
  document.getElementById('panel3').classList.toggle('active', n===3);
}

// GAME 1
// ══════════════════════════════════════════════
function buildG1Chips() {
  const wrap = document.getElementById('g1Chips');
  wrap.innerHTML = '';
  WWORDS.forEach(w => {
    const chip = document.createElement('div');
    chip.className = `w-chip ${w.css}`;
    chip.textContent = w.label;
    chip.draggable = true;
    chip.dataset.wid = w.id;
    chip.id = 'chip-' + w.id;
    chip.addEventListener('dragstart', e => {
      dragging = w.id;
      e.dataTransfer.effectAllowed = 'copy';
    });
    chip.addEventListener('dragend', () => dragging = null);
    // touch / click fallback
    chip.addEventListener('click', () => chipClicked(w.id));
    wrap.appendChild(chip);
  });
}

function chipClicked(wid) {
  const dz = document.querySelector('.drop-zone');
  if (!dz) return;
  if (dz.dataset.filled) return;
  fillDrop(dz, wid);
}

function fillDrop(dz, wid) {
  const meta = wMeta(wid);
  dz.innerHTML = '';
  dz.className = `drop-zone filled ${meta.css}`;
  dz.dataset.filled = wid;
  dz.textContent = meta.label;

  const rb = document.createElement('button');
  rb.className = 'remove-btn'; rb.textContent = '✕';
  rb.title = 'Entfernen';
  rb.onclick = (e) => { e.stopPropagation(); clearDrop(dz); };
  dz.appendChild(rb);

  document.getElementById('g1CheckBtn').disabled = false;
  g1.dropValue = wid;
}

function clearDrop(dz) {
  dz.innerHTML = '???';
  dz.className = 'drop-zone';
  delete dz.dataset.filled;
  document.getElementById('g1CheckBtn').disabled = true;
  g1.dropValue = null;
}

function renderG1() {
  const wrap = document.getElementById('g1CardWrap');
  const blockSize = currentG1BlockSize();
  const blockEnd  = g1.blockStart + blockSize;          // exclusive
  if (g1.cur >= blockEnd) { showG1End(); return; }
  const q = g1Data[g1.cur];
  const inBlock = g1.cur - g1.blockStart;               // 0-based
  const pct = Math.round((inBlock / blockSize) * 100);
  document.getElementById('g1Fill').style.width = pct + '%';
  document.getElementById('g1ProgText').textContent = `Frage ${inBlock+1} von ${blockSize}`;
  document.getElementById('g1ProgPct').textContent  = pct + '%';
  updateLoadMoreButtons();

  // build question HTML with drop zone
  const parts = q.q.split('___');
  let qHTML = '';
  parts.forEach((p, i) => {
    qHTML += `<span>${p}</span>`;
    if (i < parts.length - 1) qHTML += `<span class="drop-zone" id="g1Drop">???</span>`;
  });

  wrap.innerHTML = `
    <div class="g1-card" id="g1Card">
      <span class="g1-qnum">Frage ${inBlock+1} / ${blockSize}</span>
      <div class="answer-bubble">💬 Antwort: <span>${q.given}</span></div>
      <div style="font-size:0.8rem;color:var(--muted);font-weight:700;">📝 Ziehe das richtige W-Wort in die Lücke:</div>
      <div class="question-line">${qHTML}</div>
      <div class="g1-hint">💡 ${q.hint}</div>
      <div class="inline-fb" id="g1Fb"></div>
      <div style="display:flex;gap:12px;align-self:flex-end">
        <button class="check-btn" id="g1CheckBtn" disabled onclick="checkG1()">Prüfen ✓</button>
        <button class="next-btn"  id="g1NextBtn"           onclick="nextG1()">Weiter →</button>
      </div>
    </div>`;

  // drop zone events
  const dz = document.getElementById('g1Drop');
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', ()  => dz.classList.remove('drag-over'));
  dz.addEventListener('drop',      e   => { e.preventDefault(); dz.classList.remove('drag-over'); if (dragging) fillDrop(dz, dragging); });
  dz.addEventListener('click',     ()  => { if (dz.dataset.filled) clearDrop(dz); });
  g1.dropValue = null;
}

function checkG1() {
  const q = g1Data[g1.cur];
  const chosen = g1.dropValue;
  if (!chosen) return;

  const isOk = chosen === q.answer;
  g1.results.push({ q, chosen, isOk });

  const fb = document.getElementById('g1Fb');
  const dz = document.getElementById('g1Drop');

  if (isOk) {
    g1.correct++;
    document.getElementById('g1Correct').textContent = g1.correct;
    fb.className = 'inline-fb show ok';
    fb.innerHTML = '✅ Richtig! Super!';
  } else {
    g1.wrong++;
    document.getElementById('g1Wrong').textContent = g1.wrong;
    fb.className = 'inline-fb show bad';
    fb.innerHTML = `❌ Nicht ganz. Richtig: <strong style="margin-left:6px">${wLabel(q.answer)}</strong>`;
    // show correct in drop zone
    dz.innerHTML = '';
    dz.className = `drop-zone filled ${wClass(q.answer)}`;
    dz.textContent = wLabel(q.answer);
  }

  document.getElementById('g1CheckBtn').disabled = true;
  document.getElementById('g1NextBtn').classList.add('show');
}

function nextG1() {
  g1.cur++;
  renderG1();
}

function showG1End() {
  document.getElementById('g1CardWrap').innerHTML = '';
  document.getElementById('g1Chips').style.display = 'none';
  const end = document.getElementById('g1End');
  end.classList.add('show');

  const blockSize = currentG1BlockSize();
  const pct = Math.round((g1.correct / blockSize) * 100);
  document.getElementById('g1Score').textContent = `${g1.correct} / ${blockSize} richtig`;

  let trophy='💪', msg='Übung macht den Meister – probiere es nochmal!';
  if (pct===100){trophy='🏆';msg='Perfekt! Alle W-Fragen sitzen!';}
  else if(pct>=80){trophy='🥇';msg='Sehr gut! Du kennst die W-Fragen schon sehr gut.';}
  else if(pct>=60){trophy='👍';msg='Gut gemacht! Noch ein bisschen üben!';}

  document.getElementById('g1Trophy').textContent = trophy;
  document.getElementById('g1Msg').textContent    = msg;
  document.getElementById('g1Fill').style.width   = '100%';

  // toggle "load more" button at end screen
  const endBtn = document.getElementById('g1EndLoadBtn');
  const remaining = g1RemainingAfterBlock();
  if (remaining > 0) {
    endBtn.style.display = '';
    endBtn.disabled = false;
    endBtn.textContent = `⏭️ Weitere ${Math.min(BLOCK_SIZE, remaining)} laden`;
  } else {
    endBtn.style.display = 'none';
  }

  const list = document.getElementById('g1Results');
  list.innerHTML = '';
  g1.results.forEach(r => {
    const row = document.createElement('div');
    row.className = 'r-row ' + (r.isOk ? 'ok' : 'bad');
    row.innerHTML = `
      <div class="r-text">
        <div style="font-weight:700">${r.q.q.replace('___', `<strong style="color:${r.isOk?'var(--green)':'var(--red)'}">${wLabel(r.chosen)}</strong>`)}</div>
        ${!r.isOk ? `<div class="r-sub">✔ Richtig: <strong>${wLabel(r.q.answer)}</strong></div>` : ''}
      </div>
      <span>${r.isOk?'✅':'❌'}</span>`;
    list.appendChild(row);
  });
}

function restartG1() {
  // repeat the current block
  g1.cur       = g1.blockStart;
  g1.correct   = 0;
  g1.wrong     = 0;
  g1.results   = [];
  g1.dropValue = null;
  document.getElementById('g1Correct').textContent = 0;
  document.getElementById('g1Wrong').textContent   = 0;
  document.getElementById('g1End').classList.remove('show');
  document.getElementById('g1Chips').style.display = '';
  renderG1();
}

function loadMoreG1() {
  // jump to next block of 15 (or whatever remains)
  const next = g1.blockStart + BLOCK_SIZE;
  if (next >= g1Data.length) return;     // safety
  g1.blockStart = next;
  g1.cur        = next;
  g1.correct    = 0;
  g1.wrong      = 0;
  g1.results    = [];
  g1.dropValue  = null;
  document.getElementById('g1Correct').textContent = 0;
  document.getElementById('g1Wrong').textContent   = 0;
  document.getElementById('g1End').classList.remove('show');
  document.getElementById('g1Chips').style.display = '';
  renderG1();
}

      <span class="g2-qnum">Frage ${inBlock+1} / ${blockSize}</span>
      <div style="font-size:0.82rem;color:var(--muted);font-weight:700;">💬 Lies den Dialog – welches W-Wort fehlt?</div>
      <div class="dialog-box">${dialogHTML}</div>
      <div class="g1-hint">💡 ${q.hint}</div>
      <div class="g2-options" id="g2Opts">${optHTML}</div>
      <div class="inline-fb" id="g2Fb"></div>
      <button class="next-btn" id="g2NextBtn" onclick="nextG2()">Weiter →</button>
    </div>`;
}

function answerG2(chosen) {
  const q = g2Data[g2.cur];
  const isOk = chosen === q.answer;
  g2.results.push({ q, chosen, isOk });

  // disable all buttons
  document.querySelectorAll('.g2-opt').forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.wid === q.answer) btn.classList.add('reveal-ok');
  });
  // mark chosen
  const chosenBtn = document.querySelector(`.g2-opt[data-wid="${chosen}"]`);
  chosenBtn.classList.remove('reveal-ok');
  chosenBtn.classList.add(isOk ? 'chosen-ok' : 'chosen-bad');

  // fill gap
  const gap = document.getElementById('g2Gap');
  if (gap) {
    gap.className = `d-gap answered ${wClass(q.answer)}`;
    gap.textContent = wLabel(q.answer);
  }

  const fb = document.getElementById('g2Fb');
  if (isOk) {
    g2.correct++;
    document.getElementById('g2Correct').textContent = g2.correct;
    fb.className='inline-fb show ok'; fb.innerHTML='✅ Richtig!';
  } else {
    g2.wrong++;
    document.getElementById('g2Wrong').textContent = g2.wrong;
    fb.className='inline-fb show bad';
    fb.innerHTML=`❌ Nicht ganz. Richtig: <strong style="margin-left:6px">${wLabel(q.answer)}</strong>`;
  }

  document.getElementById('g2NextBtn').classList.add('show');
}

function nextG2() { g2.cur++; renderG2(); }

function showG2End() {
  document.getElementById('g2CardWrap').innerHTML = '';
  const end = document.getElementById('g2End');
  end.classList.add('show');

  const blockSize = currentG2BlockSize();
  const pct = Math.round((g2.correct / blockSize) * 100);
  document.getElementById('g2Score').textContent = `${g2.correct} / ${blockSize} richtig`;

  let trophy='💪', msg='Nochmal versuchen – du schaffst das!';
  if (pct===100){trophy='🏆';msg='Perfekt! Alle Dialoge verstanden!';}
  else if(pct>=80){trophy='🥇';msg='Sehr gut! Fast alles richtig!';}
  else if(pct>=60){trophy='👍';msg='Gut gemacht! Bleib dran!';}

  document.getElementById('g2Trophy').textContent = trophy;
  document.getElementById('g2Msg').textContent    = msg;
  document.getElementById('g2Fill').style.width   = '100%';

  // toggle "load more" button at end screen
  const endBtn = document.getElementById('g2EndLoadBtn');
  const remaining = g2RemainingAfterBlock();
  if (remaining > 0) {
    endBtn.style.display = '';
    endBtn.disabled = false;
    endBtn.textContent = `⏭️ Weitere ${Math.min(BLOCK_SIZE, remaining)} laden`;
  } else {
    endBtn.style.display = 'none';
  }

  const list = document.getElementById('g2Results');
  list.innerHTML = '';
  g2.results.forEach(r => {
    const row = document.createElement('div');
    row.className = 'r-row ' + (r.isOk ? 'ok' : 'bad');
    const preview = r.q.dialog.map(l=>l.text.replace('___', `"${wLabel(r.q.answer)}"`)).join(' / ');
    row.innerHTML = `
      <div class="r-text">
        <div style="font-weight:700;font-size:0.84rem">${preview}</div>
        ${!r.isOk?`<div class="r-sub">✔ Richtig: <strong>${wLabel(r.q.answer)}</strong> | Deine Antwort: ${wLabel(r.chosen)}</div>`:''}
      </div>
      <span>${r.isOk?'✅':'❌'}</span>`;
    list.appendChild(row);
  });
}

function restartG2() {
  // repeat the current block
  g2.cur     = g2.blockStart;
  g2.correct = 0;
  g2.wrong   = 0;
  g2.results = [];
  document.getElementById('g2Correct').textContent = 0;
  document.getElementById('g2Wrong').textContent   = 0;
  document.getElementById('g2End').classList.remove('show');
  renderG2();
}

function loadMoreG2() {
  const next = g2.blockStart + BLOCK_SIZE;
  if (next >= g2Data.length) return;
  g2.blockStart = next;
  g2.cur        = next;
  g2.correct    = 0;
  g2.wrong      = 0;
  g2.results    = [];
  document.getElementById('g2Correct').textContent = 0;
  document.getElementById('g2Wrong').textContent   = 0;
  document.getElementById('g2End').classList.remove('show');
  renderG2();
}

// ══════════════════════════════════════════════
// GAME 3 – Frage schreiben (Selbstkontrolle)
// ══════════════════════════════════════════════
function renderG3() {
  const wrap = document.getElementById('g3CardWrap');
  const blockSize = currentG3BlockSize();
  const blockEnd  = g3.blockStart + blockSize;
  if (g3.cur >= blockEnd) { showG3End(); return; }
  const q = g3Data[g3.cur];
  const inBlock = g3.cur - g3.blockStart;
  const pct = Math.round((inBlock / blockSize) * 100);
  document.getElementById('g3Fill').style.width   = pct + '%';
  document.getElementById('g3ProgText').textContent = `Frage ${inBlock+1} von ${blockSize}`;
  document.getElementById('g3ProgPct').textContent  = pct + '%';
  updateLoadMoreButtons();

  // reset per-question state
  g3.typed    = '';
  g3.revealed = false;

  wrap.innerHTML = `
    <div class="g3-card" id="g3Card">
      <span class="g3-qnum">Frage ${inBlock+1} / ${blockSize}</span>
      <div style="font-size:0.82rem;color:var(--muted);font-weight:700;">✏️ Schreibe die passende Frage zu dieser Antwort:</div>
      <div class="g3-answer-box">
        <span class="ab-label">💬 Antwort</span>
        <span class="ab-text">${q.given}</span>
      </div>
      <textarea class="g3-textarea" id="g3Input" placeholder="Tippe hier deine Frage… (mit ? am Ende)"
                oninput="g3.typed = this.value"></textarea>
      <div class="g3-solution-box" id="g3SolBox">
        <span class="sol-label">✔ Musterlösung</span>
        <span class="sol-text" id="g3SolText"></span>
      </div>
      <div class="self-eval-row" id="g3EvalRow">
        <button class="self-eval-btn ok"  id="g3EvalOk"  onclick="evalG3(true)">✅ Hatte ich richtig</button>
        <button class="self-eval-btn bad" id="g3EvalBad" onclick="evalG3(false)">❌ Falsch</button>
      </div>
      <div style="display:flex;gap:12px;align-self:flex-end;flex-wrap:wrap;justify-content:flex-end">
        <button class="show-sol-btn" id="g3ShowBtn" onclick="showSolutionG3()">🔍 Lösung zeigen</button>
        <button class="next-btn"     id="g3NextBtn" onclick="nextG3()">Weiter →</button>
      </div>
    </div>`;

  // focus textarea, plus Enter shortcut to reveal solution
  const ta = document.getElementById('g3Input');
  ta.focus();
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!g3.revealed) showSolutionG3();
    }
  });
}

function showSolutionG3() {
  if (g3.revealed) return;
  g3.revealed = true;
  const q = g3Data[g3.cur];

  // build coloured solution: highlight the W-word at the start
  const meta = wMeta(q.wword);
  const label = meta.label;
  const rest  = q.solution.slice(label.length); // everything after the W-word
  const html  = `<span class="sol-w ${meta.css}">${label}</span>${rest}`;
  document.getElementById('g3SolText').innerHTML = html;

  document.getElementById('g3SolBox').classList.add('show');
  document.getElementById('g3EvalRow').classList.add('show');
  document.getElementById('g3ShowBtn').disabled = true;
  document.getElementById('g3Input').disabled   = true;
}

function evalG3(isOk) {
  const q = g3Data[g3.cur];
  g3.results.push({ q, typed: g3.typed, isOk });

  // visually mark the chosen self-eval button
  document.getElementById('g3EvalOk').classList.toggle('chosen', isOk);
  document.getElementById('g3EvalBad').classList.toggle('chosen', !isOk);
  document.getElementById('g3EvalOk').disabled  = true;
  document.getElementById('g3EvalBad').disabled = true;

  if (isOk) {
    g3.correct++;
    document.getElementById('g3Correct').textContent = g3.correct;
  } else {
    g3.wrong++;
    document.getElementById('g3Wrong').textContent = g3.wrong;
  }
  document.getElementById('g3NextBtn').classList.add('show');
}

function nextG3() { g3.cur++; renderG3(); }

function showG3End() {
  document.getElementById('g3CardWrap').innerHTML = '';
  const end = document.getElementById('g3End');
  end.classList.add('show');

  const blockSize = currentG3BlockSize();
  const pct = blockSize ? Math.round((g3.correct / blockSize) * 100) : 0;
  document.getElementById('g3Score').textContent = `${g3.correct} / ${blockSize} richtig`;

  let trophy='💪', msg='Übung macht den Meister – probiere es nochmal!';
  if (pct===100){trophy='🏆';msg='Perfekt! Du kannst alle Fragen formulieren!';}
  else if(pct>=80){trophy='🥇';msg='Sehr gut! Fast alle Fragen sitzen!';}
  else if(pct>=60){trophy='👍';msg='Gut gemacht! Bleib dran!';}

  document.getElementById('g3Trophy').textContent = trophy;
  document.getElementById('g3Msg').textContent    = msg;
  document.getElementById('g3Fill').style.width   = '100%';

  // toggle "load more" button at end screen
  const endBtn = document.getElementById('g3EndLoadBtn');
  const remaining = g3RemainingAfterBlock();
  if (remaining > 0) {
    endBtn.style.display = '';
    endBtn.disabled = false;
    endBtn.textContent = `⏭️ Weitere ${Math.min(BLOCK_SIZE, remaining)} laden`;
  } else {
    endBtn.style.display = 'none';
  }

  const list = document.getElementById('g3Results');
  list.innerHTML = '';
  g3.results.forEach(r => {
    const row = document.createElement('div');
    row.className = 'r-row ' + (r.isOk ? 'ok' : 'bad');
    const typedDisplay = r.typed && r.typed.trim() ? r.typed : '<em style="color:var(--muted)">– (leer) –</em>';
    row.innerHTML = `
      <div class="r-text">
        <div style="font-weight:700;font-size:0.84rem;color:var(--muted)">💬 ${r.q.given}</div>
        <div style="font-weight:700;margin-top:3px">Deine Frage: ${typedDisplay}</div>
        <div class="r-sub">✔ Musterlösung: <strong>${r.q.solution}</strong></div>
      </div>
      <span>${r.isOk?'✅':'❌'}</span>`;
    list.appendChild(row);
  });
}

function restartG3() {
  g3.cur     = g3.blockStart;
  g3.correct = 0;
  g3.wrong   = 0;
  g3.results = [];
  g3.typed   = '';
  g3.revealed = false;
  document.getElementById('g3Correct').textContent = 0;
  document.getElementById('g3Wrong').textContent   = 0;
  document.getElementById('g3End').classList.remove('show');
  renderG3();
}

function loadMoreG3() {
  const next = g3.blockStart + BLOCK_SIZE;
  if (next >= g3Data.length) return;
  g3.blockStart = next;
  g3.cur        = next;
  g3.correct    = 0;
  g3.wrong      = 0;
  g3.results    = [];
  g3.typed      = '';
  g3.revealed   = false;
  document.getElementById('g3Correct').textContent = 0;
  document.getElementById('g3Wrong').textContent   = 0;
  document.getElementById('g3End').classList.remove('show');
  renderG3();
}

// ── Init ──────────────────────────────────────
buildG1Chips();
renderG1();
renderG2();
renderG3();
updateLoadMoreButtons();
</script>
</body>
</html>
