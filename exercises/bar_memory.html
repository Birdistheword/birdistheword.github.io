<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory: Cocktailbar</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="theme-green">

<header class="site-header">
  <div class="brand">
    <h1>Memory: Cocktailbar</h1>
    <span class="subtitle">Frage/Satz &amp; Erklärung</span>
  </div>
  <a class="back-link" href="../index.html">← Übersicht</a>
</header>

<main class="container">
  <div class="card">
    <p>Finde die Paare: <b>Frage oder Satz</b> aus der Bar und die passende <b>Erklärung</b>.</p>
  </div>
  <div id="game"></div>
</main>

<footer class="site-footer">Bird is the Word · Deutsch lernen</footer>

<script src="../assets/engine.js"></script>
<script>
  memoryGame("#game", {
    columns: 4,
    pairs: [
      ["Braucht ihr noch was?", "Um zu fragen, ob Gäste weitere Getränke, Speisen oder andere Anliegen haben. Häufig, wenn man am Tisch vorbeikommt."],
      ["Was kann ich euch bringen?", "Um die Bestellung aufzunehmen oder zu fragen, was die Gäste gerne hätten. Etwas informeller als \"Was möchten Sie haben?\"."],
      ["Was darf’s sein?", "Eine sehr gängige und direkte Frage, um nach der Bestellung zu fragen. Kurz und prägnant."],
      ["Was möchten Sie haben?", "Eine höflichere und formellere Art zu fragen, was gewünscht ist."],
      ["Möchten Sie sonst noch was?", "Um nach der Hauptbestellung zu fragen, ob die Gäste noch etwas möchten."],
      ["Bitteschön / Gerne", "Standardantwort beim Servieren oder nach einem Dankeschön."],
      ["Was macht das?", "Umgangssprachlich für: Wie viel muss ich bezahlen?"],
      ["Danke / dankeschön", "Höflicher Ausdruck für Dank beim Erhalt von Speisen oder Getränken."],
      ["Guten Durst", "Witziger Wunsch, ähnlich wie 'Prost', gesagt vor dem Trinken."],
      ["Guten Hunger", "Wie 'Guten Appetit', wird vor dem Essen gesagt."],
      ["kann ich hier bestellen?", "Frage, ob man an dieser Stelle (z. B. an der Bar) bestellen darf."],
      ["Soll ich hier bestellen?", "Rückfrage, ob es erwünscht oder üblich ist, an diesem Ort zu bestellen."],
      ["Können wir nach oben gehen?", "Frage, ob Gäste im oberen Bereich der Bar Platz nehmen dürfen."],
      ["Habt ihr oben auch noch Platz?", "Frage, ob im oberen Stockwerk noch ein Tisch frei ist."],
      ["Ja klar, das geht nur bei mir", "Hinweis, dass man nur bei dieser Person bestellen kann."],
      ["Ja, klar wir haben oben noch Platz", "Bestätigung, dass oben noch Plätze frei sind."],
      ["Ihr könnt mal schauen", "Einladung, selbst nach einem Platz zu suchen."],
      ["Ihr könnt es mal probieren", "Vorschlag, es einfach zu versuchen (z. B. oben Platz finden)."],
      ["Ich glaube oben ist es voll, sorry", "Unsichere Absage – kein Platz mehr oben."],
      ["ich weiß es gerade nicht genau", "Wenn das Personal nicht sicher ist und evtl. nachsehen muss."],
      ["Ich bin mir nicht sicher", "Allgemeine höfliche Aussage bei Unsicherheit."]
    ]
  });
</script>

</body>
</html>
