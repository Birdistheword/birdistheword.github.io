<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akkusativ-Pronomen</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="theme-purple">

<header class="site-header">
  <div class="brand">
    <h1>Akkusativ-Pronomen</h1>
    <span class="subtitle">Personalpronomen im Akkusativ · A1</span>
  </div>
  <a class="back-link" href="../index.html">← Übersicht</a>
</header>

<main class="container">
  <div class="card">
    <p>Welches Pronomen passt in die Lücke? Wähle die richtige Form im <b>Akkusativ</b>.</p>
    <table class="table" style="margin-top:12px;font-size:0.9rem">
      <thead>
        <tr><th>Nominativ</th><th>Akkusativ</th></tr>
      </thead>
      <tbody>
        <tr><td>ich</td><td><span class="badge">mich</span></td></tr>
        <tr><td>du</td><td><span class="badge">dich</span></td></tr>
        <tr><td>er</td><td><span class="badge">ihn</span></td></tr>
        <tr><td>sie (Sg.)</td><td><span class="badge">sie</span></td></tr>
        <tr><td>es</td><td><span class="badge">es</span></td></tr>
        <tr><td>wir</td><td><span class="badge">uns</span></td></tr>
        <tr><td>ihr</td><td><span class="badge">euch</span></td></tr>
        <tr><td>sie (Pl.)</td><td><span class="badge">sie</span></td></tr>
      </tbody>
    </table>
  </div>
  <div id="game"></div>
</main>

<footer class="site-footer">Bird is the Word · Deutsch lernen</footer>

<script src="../assets/engine.js"></script>
<script>
  quizGame("#game", {
    sets: [
      [
        { q:"Ich warte am Bahnhof. Kannst du ____ bitte abholen?", options:["mich","dich","ihn","uns"], answer:0, explain:"ich → mich. Ich (Subjekt) werde zum Objekt." },
        { q:"Du hast Geburtstag! Ich besuche ____ heute Abend.", options:["mich","dich","sie","euch"], answer:1, explain:"du → dich. Du bist das Ziel der Aktion." },
        { q:"Er ist neu in der Klasse. Wir kennen ____ nicht.", options:["sie","es","ihn","uns"], answer:2, explain:"er (maskulin) → ihn im Akkusativ." },
        { q:"Sie (Anna) wohnt in Berlin. Ich besuche ____ nächste Woche.", options:["sie","ihn","es","euch"], answer:0, explain:"sie bleibt 'sie' im Akkusativ." },
        { q:"Es (das Kind) schläft. Die Mutter trägt ____ ins Bett.", options:["ihn","sie","es","uns"], answer:2, explain:"Neutrum bleibt 'es' im Akkusativ." },
        { q:"Wir kommen nicht zur Party. Frank hat ____ nicht eingeladen.", options:["uns","euch","sie","mich"], answer:0, explain:"wir → uns." },
        { q:"Ihr seid meine besten Freunde. Ich vermisse ____ sehr.", options:["uns","sie","euch","dich"], answer:2, explain:"ihr → euch." },
        { q:"Sie (die Kinder) spielen im Garten. Ich sehe ____ jeden Tag.", options:["ihn","sie","es","uns"], answer:1, explain:"sie (Plural) → sie. Sehen + Akkusativ." },
        { q:"Er ist mein Bruder. Ich liebe ____.", options:["sie","ihn","es","uns"], answer:1, explain:"er → ihn. Lieben braucht Akkusativ." },
        { q:"Du spielst sehr gut. Der Trainer lobt ____ oft.", options:["mich","dich","ihn","euch"], answer:1, explain:"du → dich." }
      ],
      [
        { q:"Ich stehe vor der Tür. Siehst du ____ nicht?", options:["mich","dich","ihn","uns"], answer:0, explain:"ich → mich. Sehen + Akkusativ." },
        { q:"Sie singt sehr schön. Wir hören ____ gern.", options:["ihn","sie","es","euch"], answer:1, explain:"sie (sg.) → sie. Hören + Akkusativ." },
        { q:"Er wartet draußen. Bitte ruf ____ herein!", options:["sie","ihn","es","uns"], answer:1, explain:"er → ihn. Hereinrufen + Akkusativ." },
        { q:"Es (das Buch) ist toll. Ich lese ____ jeden Abend.", options:["ihn","sie","es","uns"], answer:2, explain:"Das Buch (neutral) = es." },
        { q:"Wir sind deine Freunde. Du kennst ____ gut.", options:["uns","euch","sie","mich"], answer:0, explain:"wir → uns. Kennen + Akkusativ." },
        { q:"Ihr macht viel Lärm. Niemand hört ____.", options:["uns","sie","euch","dich"], answer:2, explain:"ihr → euch. Hören + Akkusativ." },
        { q:"Sie (Plural) arbeiten hier. Der Chef kennt ____ gut.", options:["ihn","sie","es","uns"], answer:1, explain:"sie (Plural) → sie." },
        { q:"Sie ist meine Lehrerin. Ich mag ____ sehr.", options:["sie","ihn","es","euch"], answer:0, explain:"sie → sie. Mögen + Akkusativ." },
        { q:"Er (der Hund) ist niedlich. Wir lieben ____.", options:["sie","ihn","es","uns"], answer:1, explain:"der Hund ist maskulin → ihn." },
        { q:"Wir warten schon eine Stunde. Der Kellner hat ____ vergessen!", options:["uns","euch","sie","mich"], answer:0, explain:"wir → uns." }
      ],
      [
        { q:"Das ist meine neue Handynummer. Ruf ____ doch mal an! (mich)", options:["mich","dich","ihn","uns"], answer:0, explain:"ich → mich. Anrufen + Akkusativ." },
        { q:"Du bist krank. Der Arzt untersucht ____ jetzt.", options:["mich","dich","sie","euch"], answer:1, explain:"du → dich." },
        { q:"Der Kuchen sieht lecker aus. Ich esse ____ sofort.", options:["ihn","sie","es","uns"], answer:0, explain:"der Kuchen (maskulin) → ihn." },
        { q:"Die Musik ist schön. Ich höre ____ jeden Morgen.", options:["ihn","sie","es","euch"], answer:1, explain:"die Musik (feminin) → sie." },
        { q:"Das Auto ist kaputt. Der Mechaniker repariert ____.", options:["ihn","sie","es","uns"], answer:2, explain:"das Auto (neutral) → es." },
        { q:"Wir sind neu hier. Zeigst du ____ die Stadt?", options:["uns","euch","sie","mich"], answer:0, explain:"wir → uns." },
        { q:"Ihr seid spät dran. Ich warte auf ____.", options:["uns","sie","euch","dich"], answer:2, explain:"ihr → euch. warten auf + Akkusativ." },
        { q:"Die Gäste kommen heute. Wir holen ____ vom Flughafen ab.", options:["ihn","sie","es","uns"], answer:1, explain:"die Gäste (Plural) → sie." },
        { q:"Mein Freund ist traurig. Ich tröste ____.", options:["sie","ihn","es","euch"], answer:1, explain:"er → ihn." },
        { q:"Ich habe eine Frage. Hörst du ____ überhaupt?", options:["mich","dich","ihn","uns"], answer:0, explain:"ich → mich." }
      ],
      [
        { q:"Du hast einen Fehler gemacht. Niemand kritisiert ____ dafür.", options:["mich","dich","ihn","euch"], answer:1, explain:"du → dich." },
        { q:"Der Film war super. Ich kann ____ nur empfehlen.", options:["ihn","sie","es","uns"], answer:0, explain:"der Film (maskulin) → ihn." },
        { q:"Die Blumen sind schön. Ich gieße ____ jeden Tag.", options:["ihn","sie","es","euch"], answer:1, explain:"die Blumen (Plural) → sie." },
        { q:"Das Fenster ist offen. Kannst du ____ bitte schließen?", options:["ihn","sie","es","uns"], answer:2, explain:"das Fenster (neutral) → es." },
        { q:"Wir haben Hunger. Lädst du ____ zum Essen ein?", options:["uns","euch","sie","mich"], answer:0, explain:"wir → uns. einladen + Akkusativ." },
        { q:"Ihr habt das toll gemacht. Alle loben ____.", options:["uns","sie","euch","dich"], answer:2, explain:"ihr → euch." },
        { q:"Meine Eltern wohnen weit weg. Ich besuche ____ selten.", options:["ihn","sie","es","uns"], answer:1, explain:"die Eltern (Plural) → sie." },
        { q:"Die Touristen sind verloren. Ein Mann bringt ____ zum Hotel.", options:["ihn","es","sie","euch"], answer:2, explain:"die Touristen (Plural) → sie." },
        { q:"Ich bin müde. Lass ____ bitte schlafen.", options:["mich","dich","ihn","uns"], answer:0, explain:"ich → mich." },
        { q:"Er ist mein bester Freund. Ich treffe ____ heute.", options:["sie","ihn","es","euch"], answer:1, explain:"er → ihn. treffen + Akkusativ." }
      ]
    ]
  });
</script>

</body>
</html>
