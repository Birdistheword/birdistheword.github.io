<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akkusativ-Pronomen</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="theme-purple">

<header class="site-header">
  <div class="brand">
    <h1>Akkusativ-Pronomen</h1>
    <span class="subtitle">Ziehen &amp; Ablegen · A1</span>
  </div>
  <a class="back-link" href="../index.html">← Übersicht</a>
</header>

<main class="container">
  <div class="card">
    <p>Zieh das richtige Pronomen in jede Lücke und klicke dann auf <b>Prüfen</b>.</p>
    <details class="fold">
      <summary>Pronomen-Tabelle anzeigen <span class="fold-ico">+</span></summary>
      <div class="fold-inner">
        <table class="ptable">
          <thead>
            <tr><th>Nominativ</th><th>Akkusativ</th><th>Nominativ</th><th>Akkusativ</th></tr>
          </thead>
          <tbody>
            <tr><td>ich</td><td class="pd">mich</td><td>wir</td><td class="pd">uns</td></tr>
            <tr><td>du</td><td class="pd">dich</td><td>ihr</td><td class="pd">euch</td></tr>
            <tr><td>er</td><td class="pd">ihn</td><td>sie (Pl.)</td><td class="pd">sie</td></tr>
            <tr><td>sie / es</td><td class="pd">sie / es</td><td>Sie</td><td class="pd">Sie</td></tr>
          </tbody>
        </table>
      </div>
    </details>
  </div>
  <div id="game"></div>
</main>

<footer class="site-footer">Bird is the Word · Deutsch lernen</footer>

<script src="../assets/engine.js"></script>
<script>
  dragDropGame("#game", {
    words: ["mich","dich","ihn","sie","es","uns","euch"],
    sets: [
      [
        { sentence:"Ich warte am Bahnhof. Kannst du ____ abholen?", answer:"mich", explain:"ich → mich" },
        { sentence:"Du hast Geburtstag. Ich besuche ____ heute Abend.", answer:"dich", explain:"du → dich" },
        { sentence:"Er ist neu hier. Wir kennen ____ noch nicht.", answer:"ihn", explain:"er (maskulin) → ihn" },
        { sentence:"Anna wohnt in Berlin. Ich besuche ____ bald.", answer:"sie", explain:"sie bleibt sie" },
        { sentence:"Das Kind schläft. Die Mutter trägt ____ ins Bett.", answer:"es", explain:"es (Neutrum) → es" },
        { sentence:"Frank macht eine Party. Er hat ____ nicht eingeladen. (wir)", answer:"uns", explain:"wir → uns" },
        { sentence:"Ihr seid meine Freunde. Ich vermisse ____ sehr.", answer:"euch", explain:"ihr → euch" },
        { sentence:"Die Kinder spielen. Ich sehe ____ jeden Tag.", answer:"sie", explain:"sie (Plural) → sie" }
      ],
      [
        { sentence:"Ich stehe vor der Tür. Siehst du ____ nicht?", answer:"mich", explain:"ich → mich" },
        { sentence:"Du spielst gut. Der Trainer lobt ____ oft.", answer:"dich", explain:"du → dich" },
        { sentence:"Der Hund ist niedlich. Wir lieben ____.", answer:"ihn", explain:"der Hund → er → ihn" },
        { sentence:"Sie singt schön. Wir hören ____ gern.", answer:"sie", explain:"sie (Sg.) → sie" },
        { sentence:"Das Buch ist toll. Ich lese ____ jeden Abend.", answer:"es", explain:"das Buch → es" },
        { sentence:"Wir sind deine Freunde. Du kennst ____ gut.", answer:"uns", explain:"wir → uns" },
        { sentence:"Ihr macht Lärm. Niemand hört ____.", answer:"euch", explain:"ihr → euch" },
        { sentence:"Meine Eltern wohnen weit weg. Ich besuche ____ selten.", answer:"sie", explain:"die Eltern (Plural) → sie" }
      ],
      [
        { sentence:"Ich bin müde. Lass ____ bitte schlafen.", answer:"mich", explain:"ich → mich" },
        { sentence:"Du bist krank. Der Arzt untersucht ____ jetzt.", answer:"dich", explain:"du → dich" },
        { sentence:"Der Kuchen sieht lecker aus. Ich esse ____ sofort.", answer:"ihn", explain:"der Kuchen → ihn" },
        { sentence:"Die Musik ist schön. Ich höre ____ jeden Morgen.", answer:"sie", explain:"die Musik → sie" },
        { sentence:"Das Auto ist kaputt. Der Mechaniker repariert ____.", answer:"es", explain:"das Auto → es" },
        { sentence:"Wir sind neu hier. Zeigst du ____ die Stadt?", answer:"uns", explain:"wir → uns" },
        { sentence:"Ihr seid spät dran. Ich warte auf ____.", answer:"euch", explain:"ihr → euch" },
        { sentence:"Die Gäste kommen heute. Wir holen ____ vom Flughafen ab.", answer:"sie", explain:"die Gäste (Plural) → sie" }
      ],
      [
        { sentence:"Ich habe eine Frage. Hörst du ____ überhaupt?", answer:"mich", explain:"ich → mich" },
        { sentence:"Du hast einen Fehler gemacht. Niemand kritisiert ____.", answer:"dich", explain:"du → dich" },
        { sentence:"Der Film war super. Ich kann ____ nur empfehlen.", answer:"ihn", explain:"der Film → ihn" },
        { sentence:"Die Blumen sind schön. Ich gieße ____ jeden Tag.", answer:"sie", explain:"die Blumen (Plural) → sie" },
        { sentence:"Das Fenster ist offen. Kannst du ____ schließen?", answer:"es", explain:"das Fenster → es" },
        { sentence:"Wir haben Hunger. Lädst du ____ zum Essen ein?", answer:"uns", explain:"wir → uns" },
        { sentence:"Ihr habt das toll gemacht. Alle loben ____.", answer:"euch", explain:"ihr → euch" },
        { sentence:"Die Touristen sind verloren. Ein Mann bringt ____ zum Hotel.", answer:"sie", explain:"die Touristen (Plural) → sie" }
      ]
    ]
  });
</script>

</body>
</html>
