<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wortschatz-Memory: Wohnen</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="theme-green">

<header class="site-header">
  <div class="brand">
    <h1>Memory: Wohnen</h1>
    <span class="subtitle">Wortschatz · Begriff &amp; Erklärung</span>
  </div>
  <a class="back-link" href="../index.html">← Übersicht</a>
</header>

<main class="container">
  <div class="card">
    <p>Finde die Paare: <b>Begriff</b> und passende <b>Erklärung</b>. Klicke zwei Karten um.</p>
  </div>
  <div id="game"></div>
</main>

<footer class="site-footer">Bird is the Word · Deutsch lernen</footer>

<script src="../assets/engine.js"></script>
<script>
  memoryGame("#game", {
    columns: 4,
    sets: [
      [
        ["die WG","Abkürzung für Wohngemeinschaft. Hier wohnen oft junge Leute zusammen."],
        ["der Altbau","älteres Haus mit hoher Decke und Holzboden"],
        ["der Neubau","modernes Gebäude, oft mit Aufzug"],
        ["die Miete","monatliche Zahlung für eine Wohnung oder ein Haus."],
        ["der Mitbewohner","eine Person, die mit dir in einer Wohnung lebt."],
        ["das Möbelstück","z. B. ein Stuhl, ein Tisch oder ein Sofa."],
        ["der Umzug","wenn man die Wohnung wechselt."],
        ["die Einrichtung","alle Möbel und Dekoration in einer Wohnung."]
      ],
      [
        ["das Zimmer","ein einzelner Raum in einer Wohnung."],
        ["die Küche","ein Raum, in dem man kocht."],
        ["die Hausordnung","Regeln für das Zusammenleben im Haus."],
        ["der Nachmieter","jemand, der nach dir in eine Wohnung einzieht."],
        ["der Vermieter","Person, der eine Wohnung gehört und sie vermietet."],
        ["der Mietvertrag","schriftliche Vereinbarung über die Miete."],
        ["der Makler","hilft beim Finden einer Wohnung gegen Bezahlung."],
        ["die Kaution","Geld, das man als Sicherheit bei Mietbeginn zahlt."]
      ],
      [
        ["das Badezimmer","Raum mit Dusche, Waschbecken und Toilette."],
        ["das Schlafzimmer","Raum, in dem man schläft."],
        ["das Wohnzimmer","Raum zum Entspannen, oft mit Sofa und Fernseher."],
        ["der Balkon","kleiner Platz draußen, an der Wohnung."],
        ["der Schrank","Möbel zum Aufbewahren von Kleidung oder Geschirr."],
        ["das Bett","Möbel, in dem man schläft."],
        ["der Teppich","weicher Stoff, der auf dem Boden liegt."],
        ["die Lampe","Gerät, das einen Raum hell macht."]
      ],
      [
        ["putzen","sauber machen, zum Beispiel den Boden."],
        ["aufräumen","Dinge an ihren richtigen Platz legen."],
        ["der Keller","Raum unter dem Haus, oft zum Lagern."],
        ["der Aufzug","fährt Personen zwischen den Stockwerken."],
        ["die Heizung","macht die Wohnung im Winter warm."],
        ["der Nachbar","Person, die nebenan wohnt."],
        ["der Herd","Gerät in der Küche zum Kochen."],
        ["der Kühlschrank","hält Lebensmittel kalt und frisch."]
      ]
    ]
  });
</script>

</body>
</html>
