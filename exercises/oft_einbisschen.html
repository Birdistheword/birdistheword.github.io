<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ein bisschen oder oft?</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="theme-amber">

<header class="site-header">
  <div class="brand">
    <h1>Ein bisschen oder oft?</h1>
    <span class="subtitle">Häufigkeit oder Menge?</span>
  </div>
  <a class="back-link" href="../index.html">← Übersicht</a>
</header>

<main class="container">
  <div class="card">
    <p>Sortiere die Sätze: Beschreibt das unterstrichene Wort eine <b>Häufigkeit</b> (oft) oder eine <b>Menge</b> (ein bisschen)?</p>
  </div>
  <div id="game"></div>
</main>

<footer class="site-footer">Bird is the Word · Deutsch lernen</footer>

<script src="../assets/engine.js"></script>
<script>
  sortGame("#game", {
    buckets: [{ label: "oft" }, { label: "ein bisschen" }],
    sets: [
      [
        { text:"Ich gehe manchmal ins Kino.", bucket:0, explain:"'manchmal' = Häufigkeit → oft-Gruppe" },
        { text:"Sie trinkt ein bisschen Wasser.", bucket:1, explain:"'ein bisschen' = kleine Menge" },
        { text:"Er kommt selten zu spät.", bucket:0, explain:"'selten' = Häufigkeit, auch wenn wenig → oft-Gruppe" },
        { text:"Ich spreche ein bisschen Deutsch.", bucket:1, explain:"'ein bisschen' beschreibt hier die Menge / den Grad" },
        { text:"Wir treffen uns oft am Wochenende.", bucket:0, explain:"'oft' = Häufigkeit" },
        { text:"Sie isst ein bisschen Salat.", bucket:1, explain:"'ein bisschen' = kleine Menge" },
        { text:"Er schläft manchmal am Tag.", bucket:0, explain:"'manchmal' = Häufigkeit" },
        { text:"Kannst du ein bisschen lauter sprechen?", bucket:1, explain:"'ein bisschen' = ein wenig, Grad" },
        { text:"Ich lese häufig abends.", bucket:0, explain:"'häufig' = Häufigkeit" },
        { text:"Sie hat ein bisschen Zeit.", bucket:1, explain:"'ein bisschen' = kleine Menge" }
      ],
      [
        { text:"Er hilft mir immer.", bucket:0, explain:"'immer' = Häufigkeit (100%)" },
        { text:"Ich bin ein bisschen müde.", bucket:1, explain:"'ein bisschen' = Grad, nicht viel" },
        { text:"Sie ruft manchmal an.", bucket:0, explain:"'manchmal' = Häufigkeit" },
        { text:"Er isst ein bisschen von dem Kuchen.", bucket:1, explain:"'ein bisschen' = kleine Menge" },
        { text:"Wir fahren oft ans Meer.", bucket:0, explain:"'oft' = Häufigkeit" },
        { text:"Das Buch ist ein bisschen langweilig.", bucket:1, explain:"'ein bisschen' = Grad" },
        { text:"Sie kommen nie pünktlich.", bucket:0, explain:"'nie' = Häufigkeit (0%)" },
        { text:"Ich brauche ein bisschen Hilfe.", bucket:1, explain:"'ein bisschen' = geringe Menge" },
        { text:"Er joggt täglich.", bucket:0, explain:"'täglich' = Häufigkeit" },
        { text:"Es regnet ein bisschen.", bucket:1, explain:"'ein bisschen' = schwacher Regen, Grad" }
      ],
      [
        { text:"Ich gehe regelmäßig spazieren.", bucket:0, explain:"'regelmäßig' = Häufigkeit" },
        { text:"Sie hat ein bisschen Kopfschmerzen.", bucket:1, explain:"'ein bisschen' = Grad, nicht stark" },
        { text:"Er kommt manchmal zum Unterricht.", bucket:0, explain:"'manchmal' = Häufigkeit" },
        { text:"Kannst du mir ein bisschen Zucker geben?", bucket:1, explain:"'ein bisschen' = kleine Menge" },
        { text:"Wir spielen häufig Karten.", bucket:0, explain:"'häufig' = Häufigkeit" },
        { text:"Das ist ein bisschen teuer.", bucket:1, explain:"'ein bisschen' = Grad" },
        { text:"Sie lernt immer abends.", bucket:0, explain:"'immer' = Häufigkeit" },
        { text:"Ich habe ein bisschen Angst.", bucket:1, explain:"'ein bisschen' = Grad / Menge" },
        { text:"Er fährt oft mit dem Fahrrad.", bucket:0, explain:"'oft' = Häufigkeit" },
        { text:"Sie spricht ein bisschen Spanisch.", bucket:1, explain:"'ein bisschen' = geringer Grad der Sprachkenntnisse" }
      ],
      [
        { text:"Ich schaue selten fern.", bucket:0, explain:"'selten' = Häufigkeit" },
        { text:"Er trinkt ein bisschen Kaffee.", bucket:1, explain:"'ein bisschen' = kleine Menge" },
        { text:"Sie kommt meistens zu spät.", bucket:0, explain:"'meistens' = Häufigkeit" },
        { text:"Das Essen ist ein bisschen salzig.", bucket:1, explain:"'ein bisschen' = Grad" },
        { text:"Wir gehen manchmal ins Restaurant.", bucket:0, explain:"'manchmal' = Häufigkeit" },
        { text:"Ich brauche ein bisschen Geld.", bucket:1, explain:"'ein bisschen' = kleine Menge" },
        { text:"Er lacht oft.", bucket:0, explain:"'oft' = Häufigkeit" },
        { text:"Sie ist ein bisschen traurig.", bucket:1, explain:"'ein bisschen' = Grad" },
        { text:"Wir treffen uns regelmäßig.", bucket:0, explain:"'regelmäßig' = Häufigkeit" },
        { text:"Es fehlt noch ein bisschen Salz.", bucket:1, explain:"'ein bisschen' = kleine Menge" }
      ]
    ]
  });
</script>

</body>
</html>
