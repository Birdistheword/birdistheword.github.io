<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ein bisschen oder oft?</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="theme-amber">

<header class="site-header">
  <div class="brand">
    <h1>Ein bisschen oder oft?</h1>
    <span class="subtitle">Häufigkeit oder Menge?</span>
  </div>
  <a class="back-link" href="../index.html">← Übersicht</a>
</header>

<main class="container">
  <div class="card">
    <p>Passt <b>oft</b> (wie häufig?) oder <b>ein bisschen</b> (wie viel / wie sehr?) besser? Wähle die richtige Kategorie.</p>
  </div>
  <div id="game"></div>
</main>

<footer class="site-footer">Bird is the Word · Deutsch lernen</footer>

<script src="../assets/engine.js"></script>
<script>
  sortGame("#game", {
    buckets: [ { label: "oft" }, { label: "ein bisschen" } ],
    items: [
      { text: "Ich bin ___ müde nach dem Sport.", bucket: 1, explain: "Wie müde? → Menge/Intensität" },
      { text: "Anna übt ___ Gitarre – fast jeden Tag!", bucket: 0, explain: "Wie oft übt sie? → Häufigkeit" },
      { text: "Ich habe ___ Hunger, aber nicht viel.", bucket: 1, explain: "Wie viel Hunger? → Menge" },
      { text: "Tom fährt ___ Fahrrad – dreimal pro Woche.", bucket: 0, explain: "Wie oft fährt er? → Häufigkeit" },
      { text: "Das Lied ist ___ zu laut für mich.", bucket: 1, explain: "Wie laut? → Intensität" },
      { text: "Wir schwimmen ___ im Sommer – jedes Wochenende.", bucket: 0, explain: "Wie oft? → Häufigkeit" },
      { text: "Ich bin ___ nervös vor dem Test.", bucket: 1, explain: "Wie nervös? → Intensität" },
      { text: "Mia spielt ___ Videospiele – fast jeden Abend.", bucket: 0, explain: "Wie oft spielt sie? → Häufigkeit" },
      { text: "Ich trinke morgens oft Kaffee.", bucket: 0, explain: "Morgens, regelmäßig → Häufigkeit" },
      { text: "Ich mag Regen ein bisschen – aber nicht zu viel!", bucket: 1, explain: "Wie sehr mag sie Regen? → Menge" },
      { text: "Paul spielt oft Fußball mit seinen Freunden.", bucket: 0, explain: "Spielt er regelmäßig? → Häufigkeit" },
      { text: "Das Buch ist ein bisschen schwer für mich.", bucket: 1, explain: "Wie schwer ist das Buch? → Intensität" },
      { text: "Lukas geht oft joggen – jeden Morgen.", bucket: 0, explain: "Wie oft geht er joggen? → Häufigkeit" },
      { text: "Mir ist ein bisschen kalt im Zimmer.", bucket: 1, explain: "Wie kalt ist es? → Intensität" },
      { text: "Sie malt oft – fast jedes Wochenende.", bucket: 0, explain: "Malt sie regelmäßig? → Häufigkeit" }
    ]
  });
</script>

</body>
</html>
