<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konjunktionen Spiel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="theme-amber">

<header class="site-header">
  <div class="brand">
    <h1>Konjunktionen</h1>
    <span class="subtitle">aber · und · oder · sondern · denn</span>
  </div>
  <a class="back-link" href="../index.html">← Übersicht</a>
</header>

<main class="container">
  <div id="game"></div>
</main>

<footer class="site-footer">Bird is the Word · Deutsch lernen</footer>

<script src="../assets/engine.js"></script>
<script>
  quizGame("#game", {
    questions: [
      { q: "Ich spiele Fußball ____ ich schwimme gern.", options: ["aber","und","oder","sondern","denn"], answer: 1, explain: "und = verbindet zwei positive Dinge zusammen" },
      { q: "Er liest ein Buch, ____ er hört keine Musik.", options: ["aber","und","oder","sondern","denn"], answer: 0, explain: "aber = Kontrast / Gegensatz zwischen zwei Sätzen" },
      { q: "Spielst du Tennis ____ spielst du Volleyball?", options: ["aber","und","oder","sondern","denn"], answer: 2, explain: "oder = eine von zwei Möglichkeiten" },
      { q: "Ich gehe nicht ins Kino, ____ ich bleibe zu Hause.", options: ["aber","und","oder","sondern","denn"], answer: 3, explain: "sondern = nach 'nicht' – korrigiert etwas Negatives" },
      { q: "Sie tanzt gern, ____ Tanzen macht Spaß.", options: ["aber","und","oder","sondern","denn"], answer: 4, explain: "denn = erklärt den Grund (warum?)" },
      { q: "Wir spielen Karten ____ wir schauen einen Film.", options: ["aber","und","oder","sondern","denn"], answer: 2, explain: "oder = Auswahl zwischen zwei Aktivitäten" },
      { q: "Er macht Sport, ____ er ist oft müde.", options: ["aber","und","oder","sondern","denn"], answer: 0, explain: "aber = überraschender Gegensatz" },
      { q: "Sie liest keine Bücher, ____ sie schaut Videos.", options: ["aber","und","oder","sondern","denn"], answer: 3, explain: "sondern = korrigiert 'keine Bücher' mit der echten Antwort" },
      { q: "Ich gehe spazieren, ____ das Wetter ist schön.", options: ["aber","und","oder","sondern","denn"], answer: 4, explain: "denn = gibt den Grund für den Spaziergang" },
      { q: "Mein Bruder malt ____ spielt Gitarre.", options: ["aber","und","oder","sondern","denn"], answer: 1, explain: "und = zwei Hobbys des Bruders zusammen" },
      { q: "Sie läuft nicht, ____ sie fährt Fahrrad.", options: ["aber","und","oder","sondern","denn"], answer: 3, explain: "sondern = nach 'nicht' – zeigt die echte Alternative" },
      { q: "Er spielt gern Schach, ____ er gewinnt selten.", options: ["aber","und","oder","sondern","denn"], answer: 0, explain: "aber = positiv (gern) vs. negativ (selten gewinnen)" },
      { q: "Wir kochen zusammen ____ essen danach.", options: ["aber","und","oder","sondern","denn"], answer: 1, explain: "und = zwei Aktionen in Reihenfolge" },
      { q: "Gehst du ins Schwimmbad ____ bleibst du zu Hause?", options: ["aber","und","oder","sondern","denn"], answer: 2, explain: "oder = zwei Optionen zur Wahl" },
      { q: "Ich spiele kein Basketball, ____ ich spiele Handball.", options: ["aber","und","oder","sondern","denn"], answer: 3, explain: "sondern = nach 'kein' – die echte Information folgt" },
      { q: "Sie malt gern, ____ Malen ist kreativ.", options: ["aber","und","oder","sondern","denn"], answer: 4, explain: "denn = Erklärung, warum sie gern malt" }
    ]
  });
</script>

</body>
</html>
